# surge-ruleset-forge 源配置
#
# 每个 category 产出一个 dist/<output>.list 文件。
# forge 会下载该分类下所有 sources,解析、合并、去重后写入产物。
#
# 字段说明:
#   output:   产物文件名(不含扩展名),最终生成 dist/<output>.list
#   desc:     分类描述,写入产物头注释
#   sources:  上游规则地址列表(支持 .list / .conf,逗号分隔的 Surge 规则格式)
#   types:    可选。仅保留这些规则类型(如只要域名类、丢弃 IP 类时使用)
#             省略则继承 defaults.keep_types。
#
# 分类按策略目标分组,与个人 Surge.conf 的策略组一一对应。

defaults:
  # 仅保留下列规则类型(域名维度)。设为 null 表示不过滤。
  # 这样产出的规则集可被任意策略组复用,不会把 IP 规则混进非 IP 层。
  keep_types:
    - DOMAIN
    - DOMAIN-SUFFIX
    - DOMAIN-KEYWORD
    - DOMAIN-WILDCARD
    - DOMAIN-SET

categories:
  # === AI 服务 ===
  - output: ai
    desc: AI 服务(OpenAI / Claude / Gemini 等)
    sources:
      - https://raw.githubusercontent.com/shangrenxi/Rules/refs/heads/master/rules/AI.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/AI%20Suite.list

  # === 中文内容与国内服务 ===
  - output: cn-media
    desc: 中文内容与国内服务(微信 / 抖音 / 小红书 / 微博 / 国内媒体)
    sources:
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/WeChat/WeChat.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/DouYin/DouYin.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/XiaoHongShu/XiaoHongShu.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Weibo/Weibo.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMedia/ChinaMedia.list

  # === Apple 服务 ===
  - output: apple
    desc: Apple 服务(AppleTV / iCloud / AppleID / Apple 通用)
    sources:
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AppleTV/AppleTV.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/iCloud/iCloud.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AppleID/AppleID.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple_All_No_Resolve.list

  # === 国际社区(社交与通信) ===
  - output: social
    desc: 国际社交与通信社区(Facebook / Instagram / Twitter / Reddit / Discord 等)
    sources:
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Facebook/Facebook.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Instagram/Instagram.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Threads/Threads.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Whatsapp/Whatsapp_Resolve.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Twitter/Twitter.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Snap/Snap.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Reddit/Reddit.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Discord.list

  # === 海外流媒体 ===
  - output: streaming
    desc: 海外流媒体(Netflix / Disney+ / Max / YouTube / Spotify)
    sources:
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/Netflix.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/Disney%20Plus.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/Max.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/YouTube.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/YouTube%20Music.list
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Media/Spotify.list

  # === TikTok(单独分类,指向 TikTok 策略组) ===
  - output: tiktok
    desc: TikTok
    sources:
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/TikTok.list

  # === 开发与工具服务 ===
  - output: dev
    desc: 开发、邮件与工具服务(GitHub / GitLab / Notion / Dropbox / Protonmail 等)
    sources:
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitHub/GitHub.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitLab/GitLab.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Notion/Notion.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Dropbox/Dropbox.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AOL/AOL.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Protonmail/Protonmail.list

  # === 学术资源 ===
  - output: scholar
    desc: 学术与科研资源
    sources:
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Scholar.list

  # === 加密货币 ===
  - output: crypto
    desc: 加密货币交易所与服务
    sources:
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Crypto.list

  # === 游戏平台 ===
  - output: game
    desc: 游戏平台(EA / Epic / GOG / Origin / PlayStation / Xbox)
    sources:
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/EA/EA.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Epic/Epic.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Gog/Gog.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Origin/Origin.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PlayStation/PlayStation.list
      - https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Xbox/Xbox.list

  # === 测速 ===
  - output: speedtest
    desc: 网络测速服务
    sources:
      - https://fastly.jsdelivr.net/gh/dler-io/Rules@main/Surge/Surge%203/Provider/Speedtest.list

